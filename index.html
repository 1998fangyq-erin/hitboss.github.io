<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>暴打老板 - 渡劫一周</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; user-select: none; touch-action: none; }
        
        /* 顶部状态栏 */
        #ui-header { width: 100%; max-width: 800px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; font-size: 20px; font-weight: bold; color: #333; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .ui-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 8px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        #level-name { font-size: 16px; color: #666; font-weight: normal; }
        
        /* 右上角按钮组 */
        .header-btns { display: flex; gap: 10px; }
        .icon-btn { font-size: 22px; cursor: pointer; background: #f0f2f5; padding: 4px 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.1s; display: flex; justify-content: center; align-items: center; border: none; }
        .icon-btn:active { transform: scale(0.9); }
        
        #goal-text { color: #007bff; }
        #hp-display { color: #d9534f; }
        
        /* 九宫格 */
        #game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        .hole { position: relative; width: 100%; aspect-ratio: 3 / 4; overflow: hidden; border-radius: 10px; }
        .desk { position: absolute; bottom: 0; left: 0; width: 100%; height: auto; z-index: 2; pointer-events: none; }
        .character { position: absolute; bottom: 25%; left: 15%; width: 70%; height: auto; z-index: 1; transform: translateY(120%); transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94); cursor: pointer; pointer-events: auto; }
        .character.up { transform: translateY(0); }
        
        /* 全屏遮罩页 */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        .screen-title { text-align: center; margin-bottom: 15px; font-size: 28px; font-weight: bold; }
        .screen-desc { text-align: center; line-height: 1.6; padding: 0 20px; white-space: pre-wrap; font-size: 18px; color: #eee; }
        
        .action-btn { padding: 15px 40px; font-size: 22px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 80%; max-width: 300px; text-align: center;}
        .action-btn:active { transform: scale(0.95); }
        .btn-green { background: #5cb85c; }
        .btn-red { background: #d9534f; }
    </style>
</head>
<body>

    <div id="ui-header">
        <div class="header-top">
            <div id="level-name">准备上班...</div>
            <div class="header-btns">
                <button id="mute-btn" class="icon-btn">🔊</button>
                <button id="menu-btn" class="icon-btn">🔁</button>
            </div>
        </div>
        <div class="ui-row">
            <div>✅: <span id="score">0</span></div>
            <div id="goal-text">🎯: --</div>
            <div>❤️: <span id="hp-display">💊💊💊</span></div>
        </div>
    </div>

    <div id="game-board"></div>

    <div id="start-screen" class="overlay-screen">
        <div id="screen-title" class="screen-title">暴打狗老板</div>
        <div id="screen-desc" class="screen-desc">【入职须知】
不要漏打你的老板 | 不要误伤你的搭子</div>
        <button id="start-btn" class="action-btn btn-green">下一步</button>
    </div>

    <div id="pause-screen" class="overlay-screen" style="display: none; z-index: 200;">
        <div id="pause-title" class="screen-title">游戏已暂停</div>
        <div id="pause-desc" class="screen-desc" style="display: none; margin-bottom: 10px;"></div>
        <button id="resume-btn" class="action-btn btn-green">▶️ 继续发泄</button>
        <button id="restart-all-btn" class="action-btn btn-red">🔙 在周一重生</button>
    </div>

    <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

<script>
    const board = document.getElementById('game-board');
    const scoreEl = document.getElementById('score');
    const hpEl = document.getElementById('hp-display');
    const startScreen = document.getElementById('start-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const startBtn = document.getElementById('start-btn');
    const levelNameEl = document.getElementById('level-name');
    const goalTextEl = document.getElementById('goal-text');

    const levels = [
        { day: '星期一', title: '节后综合征', desc: '限时 20秒！搭子请假了，热身一下发泄你的周末怨气！', type: 'time', target: 20, hp: 99, partnerRate: 0, stayTime: 1200, spawnSpeed: 1000 },
        { day: '星期二', title: '突击查岗', desc: '拿到 150 分通关！搭子来串门了，千万别误伤友军！', type: 'score', target: 150, hp: 3, partnerRate: 0.3, stayTime: 1000, spawnSpeed: 800 },
        { day: '星期三', title: '夺命连环Call', desc: '在狂轰滥炸的需求中存活 30 秒！睁大眼睛！千万别手抖！', type: 'survive', target: 30, hp: 3, partnerRate: 0.4, stayTime: 800, spawnSpeed: 600 },
        { day: '星期四', title: '极致甩锅', desc: '拿到 150 分！你只有 1 滴血，零容错的极限挑战！', type: 'score', target: 150, hp: 1, partnerRate: 0.5, stayTime: 700, spawnSpeed: 550 },
        { day: '星期五', title: '拒绝加班', desc: '【无尽模式】你只有 1 滴血！\n分数越高速度越快！\n看看你的极限在哪里，挑战最高分！', type: 'endless', target: '无尽', hp: 1, partnerRate: 0.5, stayTime: 700, spawnSpeed: 550 }
    ];

    let currentLevel = 0;
    let score = 0;
    let hp = 3;
    let isPlaying = false;
    let gameLoop;
    let timerInterval;
    let timeLeft = 0;
    let holes = [];
    
    let currentSpawnSpeed = 0;
    let currentStayTime = 0;
    let highestScore = localStorage.getItem('bossHighScore') || 0; 
    let screenState = 'intro'; 

    // 🌟 全局图片预加载
    const preloadImages = ['boss.png', 'boss-hit.png', 'partner.png', 'partner-hit.png', 'desk.png'];
    preloadImages.forEach(src => { const img = new Image(); img.src = src; });

    // ==========================================
    // 🎵 BGM 音乐控制系统
    // ==========================================
    const bgm = document.getElementById('bgm');
    const muteBtn = document.getElementById('mute-btn');
    let isMuted = false;

    // 监听静音按钮点击
    muteBtn.addEventListener('click', () => {
        isMuted = !isMuted;
        bgm.muted = isMuted;
        muteBtn.innerText = isMuted ? '🔇' : '🔊';
        
        // 如果取消静音且还没播放，顺手播起来
        if (!isMuted && bgm.paused) {
            bgm.play().catch(e => console.log('等待用户交互'));
        }
    });

    // 突破浏览器限制：用户第一次点击屏幕任意位置时，开始播放音乐
    document.body.addEventListener('pointerdown', () => {
        if (!isMuted && bgm.paused) {
            bgm.play().catch(e => console.log('BGM启动等待中...'));
        }
    }, { once: true }); // once: true 表示这个监听器触发一次后就自动销毁，不占资源


    // ==========================================
    // 断点续传（存档恢复）系统
    // ==========================================
    function saveGameState() {
        if (screenState === 'intro' || hp <= 0) return; 
        const state = {
            currentLevel, score, hp, timeLeft, currentSpawnSpeed, currentStayTime, screenState,
            timestamp: Date.now()
        };
        localStorage.setItem('bossGameState', JSON.stringify(state));
    }

    setInterval(saveGameState, 1000);
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') saveGameState();
    });

    function checkRestore() {
        try {
            const savedStr = localStorage.getItem('bossGameState');
            if (!savedStr) return false;
            const saved = JSON.parse(savedStr);
            const now = Date.now();
            
            if (now - saved.timestamp > 120000) {
                localStorage.removeItem('bossGameState');
                return false;
            }

            currentLevel = saved.currentLevel;
            score = saved.score;
            hp = saved.hp;
            timeLeft = saved.timeLeft;
            currentSpawnSpeed = saved.currentSpawnSpeed;
            currentStayTime = saved.currentStayTime;
            
            const level = levels[currentLevel];
            levelNameEl.innerText = `${level.day} · ${level.title}`;
            scoreEl.innerText = score;
            updateHpUI();
            if (level.type === 'time' || level.type === 'survive') goalTextEl.innerText = `🕐: ${timeLeft}秒`;
            else if (level.type === 'score') goalTextEl.innerText = `🎯: 拿够 ${level.target}分`;
            else if (level.type === 'endless') goalTextEl.innerText = `历史最高分: ${highestScore}`;

            if (saved.screenState === 'playing' || saved.screenState === 'paused') {
                screenState = 'paused';
                startScreen.style.display = 'none'; 
                
                document.getElementById('pause-title').innerText = '检测到游戏存档';
                document.getElementById('pause-desc').innerText = '欢迎回来！2 分钟内的进度已为你保留。';
                document.getElementById('pause-desc').style.display = 'block';
                
                pauseScreen.style.display = 'flex'; 
            } else if (saved.screenState === 'transition') {
                screenState = 'transition';
                startScreen.style.display = 'flex';
                document.getElementById('screen-title').innerText = `顺利度过 ${levels[currentLevel-1].day}！`;
                document.getElementById('screen-desc').innerText = '存档已恢复，准备迎接明天的挑战。';
                startBtn.innerText = `查看 ${levels[currentLevel].day} 任务`;
            } else if (saved.screenState === 'briefing') {
                showBriefing();
            }
            return true;
        } catch (e) {
            return false;
        }
    }

    // ==========================================
    // 状态机与关卡管理器
    // ==========================================
    function showBriefing() {
        screenState = 'briefing';
        const level = levels[currentLevel];
        document.getElementById('screen-title').innerText = `【当前任务】${level.day} · ${level.title}`;
        document.getElementById('screen-desc').innerText = level.desc;
        startBtn.innerText = '打卡上班';
        startScreen.style.display = 'flex';
    }

    function startLevel() {
        screenState = 'playing';
        const level = levels[currentLevel];
        score = 0;
        hp = level.hp;
        timeLeft = (level.type === 'time' || level.type === 'survive') ? level.target : 0;
        
        currentSpawnSpeed = level.spawnSpeed;
        currentStayTime = level.stayTime;
        isPlaying = true;

        levelNameEl.innerText = `${level.day} · ${level.title}`;
        scoreEl.innerText = score;
        updateHpUI();
        updateGoalUI(level);

        startScreen.style.display = 'none';
        if(gameLoop) clearTimeout(gameLoop); 
        if(timerInterval) clearInterval(timerInterval);
        
        initBoard(); 
        scheduleNextPeep(level);

        if (level.type === 'time' || level.type === 'survive') {
            timerInterval = setInterval(() => {
                if (!isPlaying) return;
                timeLeft--;
                goalTextEl.innerText = `🕐: ${timeLeft}秒`;
                if (timeLeft <= 0) checkLevelComplete();
            }, 1000);
        }
    }

    function resumeGame() {
        screenState = 'playing';
        const level = levels[currentLevel];
        isPlaying = true;
        
        startScreen.style.display = 'none';
        pauseScreen.style.display = 'none';
        
        if(gameLoop) clearTimeout(gameLoop);
        if(timerInterval) clearInterval(timerInterval);
        
        initBoard(); 
        scheduleNextPeep(level); 

        if (level.type === 'time' || level.type === 'survive') {
            timerInterval = setInterval(() => {
                if (!isPlaying) return;
                timeLeft--;
                goalTextEl.innerText = `🕐: ${timeLeft}秒`;
                if (timeLeft <= 0) checkLevelComplete();
            }, 1000);
        }
    }

    function scheduleNextPeep(level) {
        if (!isPlaying) return;
        peep(level);
        gameLoop = setTimeout(() => scheduleNextPeep(level), currentSpawnSpeed);
    }

    function updateGoalUI(level) {
        if (level.type === 'time' || level.type === 'survive') goalTextEl.innerText = `🎯: 活过 ${level.target}秒`;
        else if (level.type === 'score') goalTextEl.innerText = `🎯: 拿够 ${level.target}分`;
        else if (level.type === 'endless') goalTextEl.innerText = `历史最高分: ${highestScore}`; 
    }

    function updateHpUI() {
        if (hp > 10) {
            hpEl.innerText = '🛡️无敌';
        } else {
            let hpStr = '';
            for(let i=0; i<hp; i++) hpStr += '💊';
            hpEl.innerText = hpStr || '濒死';
        }
    }

    function checkLevelComplete() {
        if (!isPlaying) return;
        const level = levels[currentLevel];
        let isWin = false;

        if ((level.type === 'time' || level.type === 'survive') && timeLeft <= 0 && hp > 0) isWin = true;
        if (level.type === 'score' && score >= level.target) isWin = true;

        if (isWin) levelVictory();
    }

    function levelVictory() {
        isPlaying = false;
        clearTimeout(gameLoop);
        if(timerInterval) clearInterval(timerInterval);
        holes.forEach(h => clearHole(h));

        setTimeout(() => {
            currentLevel++;
            if (currentLevel >= levels.length) {
                currentLevel = 0; 
                localStorage.removeItem('bossGameState'); 
            } else {
                screenState = 'transition';
                startScreen.style.display = 'flex';
                document.getElementById('screen-title').innerText = `顺利度过 ${levels[currentLevel-1].day}！`;
                document.getElementById('screen-desc').innerText = '喘口气，准备迎接明天的挑战。';
                startBtn.innerText = `查看 ${levels[currentLevel].day} 任务`;
            }
        }, 500);
    }

    function endGame() {
        isPlaying = false;
        clearTimeout(gameLoop);
        if(timerInterval) clearInterval(timerInterval);
        holes.forEach(h => clearHole(h));
        
        localStorage.removeItem('bossGameState'); 
        
        setTimeout(() => {
            screenState = 'transition';
            startScreen.style.display = 'flex';
            
            if (levels[currentLevel].type === 'endless') {
                document.getElementById('screen-title').innerText = '又得加班！';
                document.getElementById('screen-desc').innerText = `【拒绝加班结算】\n本次得分: ${score}\n历史最高分: ${highestScore}\n\n太难了，重回周一的炼狱吧！`;
            } else {
                document.getElementById('screen-title').innerText = '你被开除了！';
                document.getElementById('screen-desc').innerText = `倒在了 ${levels[currentLevel].day}，赶紧重新找工作吧。`;
            }
            
            startBtn.innerText = '重新入职 (回到周一)';
            currentLevel = 0; 
        }, 500);
    }

    // ==========================================
    // 菜单与交互逻辑（防抖）
    // ==========================================
    document.getElementById('menu-btn').addEventListener('click', () => {
        if (screenState !== 'playing') return; 
        
        isPlaying = false;
        screenState = 'paused'; 
        clearTimeout(gameLoop);
        if (timerInterval) clearInterval(timerInterval);
        holes.forEach(h => clearHole(h));
        
        document.getElementById('pause-title').innerText = '游戏已暂停';
        document.getElementById('pause-desc').style.display = 'none'; 
        pauseScreen.style.display = 'flex';
    });

    document.getElementById('resume-btn').addEventListener('click', () => {
        if (screenState !== 'paused') return; 
        resumeGame();
    });

    document.getElementById('restart-all-btn').addEventListener('click', () => {
        pauseScreen.style.display = 'none';
        currentLevel = 0;
        localStorage.removeItem('bossGameState'); 
        
        screenState = 'intro';
        startScreen.style.display = 'flex';
        document.getElementById('screen-title').innerText = '暴打狗老板';
        document.getElementById('screen-desc').innerText = '【入职须知】\n不要漏打你的老板 | 不要误伤你的搭子';
        startBtn.innerText = '下一步';
    });

    startBtn.addEventListener('click', () => {
        if (screenState === 'intro' || screenState === 'transition') {
            showBriefing();
        } else if (screenState === 'briefing') {
            startLevel();
        } 
    });

    // ==========================================
    // 核心战斗与点击引擎
    // ==========================================
    function clearHole(h) {
        clearTimeout(h.timeout);
        h.charImg.classList.remove('up');
        h.isUp = false;
    }

    function initBoard() {
        if (holes && holes.length > 0) {
            holes.forEach(h => clearHole(h));
        }

        board.innerHTML = '';
        holes = [];
        for (let i = 0; i < 9; i++) {
            const holeEl = document.createElement('div');
            holeEl.className = 'hole';
            const charImg = document.createElement('img');
            charImg.className = 'character';
            const deskImg = document.createElement('img');
            deskImg.className = 'desk';
            deskImg.src = 'desk.png';

            holeEl.appendChild(charImg);
            holeEl.appendChild(deskImg);
            board.appendChild(holeEl);
            
            const holeData = { element: holeEl, charImg: charImg, isUp: false, type: '', isHit: false, timeout: null };
            holes.push(holeData);

            holeEl.addEventListener('mousedown', () => whack(holeData, charImg));
            holeEl.addEventListener('touchstart', (e) => { e.preventDefault(); whack(holeData, charImg); });
        }
    }

    function peep(level) {
        if (!isPlaying) return;
        const availableHoles = holes.filter(h => !h.isUp);
        if (availableHoles.length === 0) return;
        const hole = availableHoles[Math.floor(Math.random() * availableHoles.length)];

        hole.type = Math.random() < level.partnerRate ? 'partner' : 'boss';
        hole.charImg.src = hole.type === 'boss' ? 'boss.png' : 'partner.png';
        hole.isUp = true;
        hole.isHit = false;
        hole.charImg.classList.add('up');

        hole.timeout = setTimeout(() => {
            if (!isPlaying) return; 
            hole.charImg.classList.remove('up');
            hole.isUp = false;

            if (hole.type === 'boss' && !hole.isHit && level.type !== 'time') {
                takeDamage("漏打老板！"); 
            }
        }, currentStayTime);
    }

    function whack(holeData, charImg) {
        if (!isPlaying || !holeData.isUp) return;
        const level = levels[currentLevel];

        if (holeData.type === 'boss') {
            if (holeData.isHit) return; 
            holeData.isHit = true; 
            score += 10;
            scoreEl.innerText = score;
            charImg.src = 'boss-hit.png'; 

            if (level.type === 'endless') {
                if (score % 50 === 0) {
                    currentSpawnSpeed = Math.max(250, currentSpawnSpeed - 40); 
                    currentStayTime = Math.max(350, currentStayTime - 40);   
                }
                if (score > highestScore) {
                    highestScore = score;
                    localStorage.setItem('bossHighScore', highestScore);
                    goalTextEl.innerText = `历史最高分: ${highestScore}`;
                }
            }
            
            clearTimeout(holeData.timeout);
            holeData.timeout = setTimeout(() => {
                charImg.classList.remove('up');
                holeData.isUp = false;
                checkLevelComplete(); 
            }, 150);

        } else if (holeData.type === 'partner') {
            if (holeData.isHit) return;
            holeData.isHit = true;
            
            charImg.src = 'partner-hit.png'; 
            
            clearTimeout(holeData.timeout);
            holeData.timeout = setTimeout(() => {
                charImg.classList.remove('up');
                holeData.isUp = false;
                takeDamage("误伤搭子！");
            }, 150);
        }
    }

    function takeDamage(reason) {
        if (!isPlaying || hp > 10) return; 
        hp--;
        updateHpUI();
        
        document.body.style.backgroundColor = '#ffcccc';
        setTimeout(() => { document.body.style.backgroundColor = '#f0f2f5'; }, 150);
        
        if (hp <= 0) endGame();
    }

    // 执行首次页面加载检查
    checkRestore();

</script>
</body>
</html>
